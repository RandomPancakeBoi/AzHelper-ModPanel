<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moderator Dashboard</title>

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="container">
        <h1>Moderator Dashboard</h1>
        <p>Review and manage all submitted appeals.</p>

        <button id="logoutBtn" class="logout">Logout</button>

        <div id="appealsContainer" class="appeals"></div>
    </div>

    <script>
        const BACKEND_URL = "https://azhelper-modpanel.onrender.com";

        async function loadAppeals() {
            const res = await fetch(`${BACKEND_URL}/appeals/list`, {
                credentials: "include"
            });

            const appeals = await res.json();

            const container = document.getElementById("appealsContainer");
            container.innerHTML = "";

            if (!Array.isArray(appeals) || appeals.length === 0) {
                container.innerHTML = "<p>No appeals found.</p>";
                return;
            }

            appeals.forEach(app => {
                const card = document.createElement("div");
                card.className = "appeal-card";

                card.innerHTML = `
                    <h3>Appeal #${app.id}</h3>
                    <p><strong>User:</strong> ${app.username}</p>
                    <p><strong>User ID:</strong> ${app.userid}</p>
                    <p><strong>Reason:</strong> ${app.reason}</p>
                    <p><strong>Evidence:</strong> ${app.evidence || "None"}</p>
                    <p><strong>Status:</strong> <span class="status ${app.status}">${app.status}</span></p>

                    <div class="actions">
                        <button class="approve" onclick="updateAppeal(${app.id}, 'approved')">Approve</button>
                        <button class="deny" onclick="updateAppeal(${app.id}, 'denied')">Deny</button>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        async function updateAppeal(id, status) {
            const res = await fetch(`${BACKEND_URL}/appeals/update`, {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ id, status })
            });

            const json = await res.json();

            if (json.success) {
                loadAppeals();
            } else {
                alert("Error updating appeal: " + json.error);
            }
        }

        document.getElementById("logoutBtn").addEventListener("click", () => {
            window.location.href = BACKEND_URL + "/auth/logout";
        });

        loadAppeals();
    </script>

</body>
</html>
