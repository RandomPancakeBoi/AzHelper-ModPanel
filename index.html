<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Azura's Hideout Ban Appeal</title>

    <!-- Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <a href="https://azhelper-modpanel.onrender.com/auth/login">
      <button class="login-btn">Moderator Login</button>
    </a>


    <div class="container">
        <h1>Azura's Hideout Ban Appeal</h1>
        <p>Please fill out the form below to submit your appeal.</p>

        <form id="appealForm">
            <label>Discord Username</label>
            <input type="text" id="username" required placeholder="Example#1234" />

            <label>Discord User ID</label>
            <input type="text" id="userid" required placeholder="123456789012345678" />

            <label>Why should your ban be removed?</label>
            <textarea id="reason" required placeholder="Explain your situation..."></textarea>

            <label>Any evidence (optional)</label>
            <textarea id="evidence" placeholder="Links, screenshots, etc."></textarea>

            <!-- Turnstile CAPTCHA -->
            <div class="cf-turnstile" data-sitekey="0x4AAAAAACrJ5Wbb62GTJ_Zw"></div>

            <button type="submit">Submit Appeal</button>
        </form>

        <p id="responseMessage"></p>
    </div>

    <script>
        const BACKEND_URL = "https://azhelper-modpanel.onrender.com";

        document.getElementById("appealForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const turnstileToken = turnstile.getResponse();

            const data = {
                username: document.getElementById("username").value,
                userid: document.getElementById("userid").value,
                reason: document.getElementById("reason").value,
                evidence: document.getElementById("evidence").value,
                turnstileToken
            };

            const res = await fetch(`${BACKEND_URL}/appeals/submit`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const json = await res.json();

            if (json.success) {
                document.getElementById("responseMessage").innerText =
                    "Your appeal has been submitted successfully.";
            } else {
                document.getElementById("responseMessage").innerText =
                    "Error: " + json.error;
            }
        });
    </script>

</body>
</html>
